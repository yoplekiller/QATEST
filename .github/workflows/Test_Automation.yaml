name: Test Automation
on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *' # 실행 시간 설정(UTC)

concurrency:  # 동시에 여러 개의 배포 실행 방지
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  ui_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m venv venv
          venv/bin/python -m pip install -r requirements.txt allure-pytest

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://github.com/allure-framework/allure2/releases/download/2.32.2/allure-2.32.2.tgz
          tar -zxvf allure-2.32.2.tgz
          sudo mv allure-2.32.2 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      - name: Set Test credentials
        run: |
          echo "KURLY_TEST_USERNAME=${{ secrets.KURLY_TEST_USERNAME }}" >> $GITHUB_ENV
          echo "KURLY_TEST_PASSWORD=${{ secrets.KURLY_TEST_PASSWORD }}" >> $GITHUB_ENV

      - name: Run UI Tests
        run: |
          rm -rf allure-results-ui || true
          mkdir -p allure-results-ui
          venv/bin/python -m pytest src/tests/ui \
            --alluredir=allure-results-ui \
            --junitxml=ui_report.xml \
            --json-report --json-report-file=test_results_ui.json \
            --capture=tee-sys -v \
            --maxfail=100 --disable-warnings --tb=short
        continue-on-error: true

      - name: Upload UI Test Results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ui
          path: test_results_ui.json
          retention-days: 7
          if-no-files-found: warn

      - name: Upload UI Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results-ui
          retention-days: 7

      - name: Upload UI Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: ui_report.xml
          retention-days: 7
          if-no-files-found: warn 

  api_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set RUN_TS (timestamp)
        run: |
          echo "RUN_TS=$(TZ=Asia/Seoul date +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV
          echo "BRANCH_NAME=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m venv venv
          venv/bin/python -m pip install -r requirements.txt allure-pytest

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://github.com/allure-framework/allure2/releases/download/2.32.2/allure-2.32.2.tgz
          tar -zxvf allure-2.32.2.tgz
          sudo mv allure-2.32.2 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      - name: Set API Key Environment Variable
        run: echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> $GITHUB_ENV

      - name: Run API Tests
        run: |
          rm -rf allure-results-api || true
          mkdir -p allure-results-api
          venv/bin/python -m pytest src/tests/api \
            --alluredir=allure-results-api \
            --junitxml=api_report.xml \
            --json-report --json-report-file=test_results_api.json \
            --capture=tee-sys -v \
            --maxfail=100 --disable-warnings --tb=short
        continue-on-error: true

      - name: Upload API Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results-api
          retention-days: 7

      - name: Upload API Test Results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api
          path: test_results_api.json
          retention-days: 7
          if-no-files-found: warn

      - name: Upload API Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: api_report.xml
          retention-days: 7

  # ==========================================
  # Jira 버그 자동 등록
  # ==========================================
  create_jira_bugs:
    needs: [ui_tests, api_tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jira python-dotenv

      - name: Download UI Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results-ui
          path: .
        continue-on-error: true

      - name: Download API Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results-api
          path: .
        continue-on-error: true

      - name: Create Jira Bug Tickets
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        run: python utils/create_jira_bugs.py

  # ==========================================
  # Allure Report 배포 (GitHub Pages)
  # ==========================================
  deploy:
    needs: [ui_tests, api_tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set Branch Name
        run: |
          echo "BRANCH_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          # 브랜치 이름을 경로로 사용 (슬래시를 대시로 변환)
          SAFE_BRANCH=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV

      - name: Download UI Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results-ui
        continue-on-error: true

      - name: Download API Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results-api
        continue-on-error: true

      - name: Merge Allure Results
        run: |
          mkdir -p allure-results
          cp -r allure-results-ui/* allure-results/ 2>/dev/null || true
          cp -r allure-results-api/* allure-results/ 2>/dev/null || true

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/allure-framework/allure2/releases/download/2.32.2/allure-2.32.2.tgz
          tar -zxvf allure-2.32.2.tgz
          sudo mv allure-2.32.2 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Generate Allure Report
        run: |
          # 브랜치별 경로에 리포트 생성
          allure generate allure-results -o allure-report/${{ env.SAFE_BRANCH }} --clean

      - name: Set Last Updated Time
        run: echo "LAST_UPDATED=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV


      # ALLURE INDEX PAGE 생성
      - name: Create Index Page
        run: |
          cat > allure-report/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ko">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>QATEST - Test Reports</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      padding: 20px;
                  }
                  .container {
                      background: white;
                      border-radius: 16px;
                      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                      padding: 40px;
                      max-width: 800px;
                      width: 100%;
                  }
                  h1 {
                      color: #333;
                      margin-bottom: 10px;
                      font-size: 2.5em;
                  }
                  .subtitle {
                      color: #666;
                      margin-bottom: 40px;
                      font-size: 1.1em;
                  }
                  .branch-list {
                      list-style: none;
                  }
                  .branch-item {
                      margin-bottom: 15px;
                  }
                  .branch-link {
                      display: flex;
                      align-items: center;
                      padding: 20px;
                      background: #f8f9fa;
                      border-radius: 12px;
                      text-decoration: none;
                      color: #333;
                      transition: all 0.3s ease;
                      border: 2px solid transparent;
                  }
                  .branch-link:hover {
                      background: #667eea;
                      color: white;
                      transform: translateX(10px);
                      border-color: #667eea;
                  }
                  .branch-icon {
                      font-size: 24px;
                      margin-right: 15px;
                  }
                  .branch-name {
                      font-size: 1.2em;
                      font-weight: 600;
                  }
                  .current {
                      background: #e7f3ff;
                      border-color: #667eea;
                  }
                  .footer {
                      margin-top: 40px;
                      text-align: center;
                      color: #666;
                      font-size: 0.9em;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🧪 QATEST</h1>
                  <p class="subtitle">Test Automation Reports</p>

                  <ul class="branch-list">
                      <li class="branch-item">
                          <a href="./main/" class="branch-link current">
                              <span class="branch-icon">🌿</span>
                              <span class="branch-name">main</span>
                          </a>
                      </li>
                      <li class="branch-item">
                          <a href="./develop/" class="branch-link">
                              <span class="branch-icon">🔧</span>
                              <span class="branch-name">develop</span>
                          </a>
                      </li>
                      <!-- Add more branches as needed -->
                  </ul>

                  <div class="footer">
                      <p>Last updated: ${{ env.LAST_UPDATED }}</p>
                      <p>Branch: ${{ env.BRANCH_NAME }} | Run: <a href="https://github.com/yoplekiller/QATEST/actions/runs/${{ github.run_id }}" target="_blank">#${{ github.run_id }}</a></p>
                  </div>
              </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          keep_files: true
          destination_dir: .

  # ==========================================
  # Slack 알림
  # ==========================================
  notify_slack:
    needs: [ui_tests, api_tests, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Download UI Test Report
        uses: actions/download-artifact@v4
        with:
          name: ui-test-report
          path: .
        continue-on-error: true

      - name: Download API Test Report
        uses: actions/download-artifact@v4
        with:
          name: api-test-report
          path: .
        continue-on-error: true

      - name: Send Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.QA_SLACK_WEBHOOK_URL }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          python utils/send_slack_result.py
