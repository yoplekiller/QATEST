name: Run Selenium Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies and tools
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -q -O /tmp/chromedriver.zip wget -q -O chromedriver.zip C:\Users\jmlim\Desktop\chromedriver-win32\chromedriver.exe"
          unzip chromedriver.zip -d C:\Users\jmlim\chromedriver
          chmod +x /usr/local/bin/chromedriver
          sudo apt-get install -y google-chrome-stable
       
      - name: Debug environment
        run: |
          ls -la /usr/local/bin/
          which chromedriver
          chromedriver --version
          google-chrome --version    

      - name: Run tests
        run: pytest --maxfail=5 --disable-warnings

      - name: Upload HTML Report
        uses: actions/upload-artifact@v3
        with:
          name: test-report
          path: report.html