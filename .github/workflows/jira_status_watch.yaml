name: Jira Status Watcher

on:
    schedule:
        - cron: '0 * * * *' # Runs every hour
    workflow_dispatch: # Allows manual triggering

permissions:
    contents: write

jobs:
    watch:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: '3.11'

            - name: Install Dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install requests python-dotenv jira

            - name: Run Jira Status Watcher
              env:
                  JIRA_URL: ${{ secrets.JIRA_URL }}
                  JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
                  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
                  JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
                  QA_SLACK_WEBHOOK_URL: ${{ secrets.QA_SLACK_WEBHOOK_URL }}
              run: |
                  python utils/jira_status_watcher.py

            - name: Commit Cache
              run: |
                git config user.name "github-actions"
                git config user.email "github-actions@github.com"
                git add cache/jira_status_cache.json
                git diff --cached --quiet || git commit -m "chore: update jira status cache"
                git push